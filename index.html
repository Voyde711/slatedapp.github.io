<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SLATED — Track What's Coming</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: linear-gradient(135deg, #1A2332 0%, #1D3048 100%);
    color: #ECF0F6;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    text-align: center;
  }
  .wordmark {
    font-family: -apple-system, BlinkMacSystemFont, 'Arial Narrow', sans-serif;
    font-size: 96px;
    font-weight: 800;
    font-style: italic;
    color: #ECF0F6;
    letter-spacing: 0.03em;
    line-height: 1;
    margin-bottom: 8px;
    text-shadow: 0 2px 40px rgba(43,142,255,0.15);
  }
  .wordmark-accent {
    width: 40px;
    height: 3px;
    background: #2B8EFF;
    margin: 0 auto 28px;
  }
  .signal { color: #2B8EFF; }
  .tagline {
    font-size: 18px;
    color: #7C96B2;
    line-height: 1.6;
    max-width: 420px;
    margin-bottom: 48px;
  }
  .badges {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
    margin-bottom: 16px;
  }
  .badge-link {
    opacity: 0.7;
    transition: opacity 0.15s;
  }
  .badge-link:hover { opacity: 1; }
  .coming-soon-note {
    font-size: 12px;
    color: #415870;
    margin-top: 8px;
  }
  footer {
    padding: 24px;
    text-align: center;
    border-top: 1px solid rgba(255,255,255,0.07);
    display: flex;
    gap: 24px;
    justify-content: center;
    align-items: center;
    flex-wrap: wrap;
  }
  footer a {
    font-size: 12px;
    color: #607898;
    text-decoration: none;
    letter-spacing: 0.05em;
    transition: color 0.15s;
  }
  footer a:hover { color: #ECF0F6; }
  footer .copyright {
    font-size: 12px;
    color: #415870;
  }
  .diamond { color: #2B8EFF; }
</style>
</head>
<body>
<main>
  <div class="wordmark">SLATED</div>
  <div class="wordmark-accent"></div>
  <p class="tagline">
    Track upcoming game releases. Know what's dropping, on what platform, and exactly how long until launch.
  </p>
  <div class="badges">
    <a href="#" class="badge-link">
      <img src="https://developer.apple.com/app-store/marketing/guidelines/images/badge-download-on-the-app-store.svg" alt="Download on the App Store" height="48" />
    </a>
    <a href="#" class="badge-link">
      <img src="https://play.google.com/intl/en_us/badges/static/images/badges/en_badge_web_generic.png" alt="Get it on Google Play" height="48" />
    </a>
  </div>
  <p class="coming-soon-note">Coming soon to iOS and Android</p>
</main>
<footer>
  <span class="copyright">© 2026 Marshall Patterson</span>
  <a href="/privacy">Privacy Policy</a>
  <a href="/terms">Terms of Service</a>
</footer>
</body>
</html>
